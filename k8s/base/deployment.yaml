apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-app
  labels:
    app: weather-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-app
  template:
    metadata:
      labels:
        app: weather-app
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: weather-app
          image: cst8918group4acr.azurecr.io/weather-app:latest
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: weather-app-secrets
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: weather-app-secrets
                  key: REDIS_PORT
            - name: REDIS_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-app-secrets
                  key: REDIS_KEY
            - name: WEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-app-secrets
                  key: WEATHER_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
